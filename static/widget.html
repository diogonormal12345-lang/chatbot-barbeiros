<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <title>Chat</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root { --brand:#2563eb; --bg:#f8fafc; --bot:#e2e8f0; --user:#2563eb; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background:var(--bg); }
    #chat { display:flex; flex-direction:column; height:100vh; max-width:420px; margin:0 auto; background:#fff; }
    #header { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:12px 16px; background:var(--brand); color:#fff; font-weight:600; }
    #wa-btn { display:none; align-items:center; gap:6px; padding:6px 10px; background:#25D366; color:#fff; border-radius:6px; text-decoration:none; font-size:13px; font-weight:500; }
    #wa-btn:hover { background:#1ebe57; }
    #wa-btn svg { width:14px; height:14px; }
    #log { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; }
    .msg { padding:8px 12px; border-radius:12px; max-width:85%; line-height:1.35; white-space:pre-wrap; }
    .msg.user { align-self:flex-end; background:var(--user); color:#fff; border-bottom-right-radius:4px; }
    .msg.bot  { align-self:flex-start; background:var(--bot); color:#0f172a; border-bottom-left-radius:4px; }
    #form { display:flex; gap:8px; padding:10px; border-top:1px solid #e2e8f0; }
    #input { flex:1; padding:10px 12px; border:1px solid #cbd5e1; border-radius:8px; font:inherit; }
    button { padding:10px 14px; background:var(--brand); color:#fff; border:0; border-radius:8px; cursor:pointer; font:inherit; }
    button:disabled { opacity:.5; cursor:wait; }
    .hint { color:#64748b; font-size:12px; padding:4px 12px 8px; }
  </style>
</head>
<body>
  <div id="chat">
    <div id="header">
      <span id="title">Assistente Virtual</span>
      <a id="wa-btn" href="#" target="_blank" rel="noopener" title="Falar com humano via WhatsApp">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
        WhatsApp
      </a>
    </div>
    <div id="log"></div>
    <div class="hint">Pergunte sobre horários, serviços ou marque uma consulta.</div>
    <form id="form" autocomplete="off">
      <input id="input" placeholder="Escreva a sua mensagem..." required>
      <button type="submit">Enviar</button>
    </form>
  </div>

<script>
  const API = (window.CHATBOT_API || "").replace(/\/$/, "") || "";
  const log = document.getElementById("log");
  const form = document.getElementById("form");
  const input = document.getElementById("input");
  const button = form.querySelector("button");
  const title = document.getElementById("title");
  const waBtn = document.getElementById("wa-btn");
  const history = [];

  function add(role, text) {
    const div = document.createElement("div");
    div.className = "msg " + (role === "user" ? "user" : "bot");
    div.textContent = text;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  // Load business config (name + WhatsApp number) from backend
  fetch(API + "/widget-config")
    .then(r => r.json())
    .then(cfg => {
      if (cfg.business_name) title.textContent = cfg.business_name;
      if (cfg.whatsapp) {
        const msg = encodeURIComponent(`Olá, vim do website e gostava de falar convosco.`);
        waBtn.href = `https://wa.me/${cfg.whatsapp}?text=${msg}`;
        waBtn.style.display = "inline-flex";
      }
    })
    .catch(() => {});

  add("bot", "Olá! Em que posso ajudar?");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const message = input.value.trim();
    if (!message) return;
    add("user", message);
    history.push({ role: "user", content: message });
    input.value = "";
    button.disabled = true;
    try {
      const res = await fetch(API + "/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message, history: history.slice(-10) }),
      });
      const data = await res.json();
      add("bot", data.reply || "Desculpe, ocorreu um erro.");
      history.push({ role: "assistant", content: data.reply });
    } catch (err) {
      add("bot", "Não foi possível contactar o servidor.");
    } finally {
      button.disabled = false;
      input.focus();
    }
  });
</script>
</body>
</html>
